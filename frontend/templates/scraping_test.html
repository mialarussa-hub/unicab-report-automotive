{% extends "base.html" %}

{% block title %}Test Scraping — UNICAB{% endblock %}

{% block content %}
<div class="scraping-test">
    <h1>Test Scraping</h1>
    <p class="subtitle">Inserisci un brand e modello per testare lo scraping da tutte le fonti.</p>

    <form id="scraping-form" class="scraping-form">
        <div class="form-row">
            <div class="form-group">
                <label for="brand">Brand *</label>
                <input type="text" id="brand" name="brand" placeholder="es. Fiat, Alfa Romeo, BMW" required>
            </div>
            <div class="form-group">
                <label for="model">Modello</label>
                <input type="text" id="model" name="model" placeholder="es. Panda, Giulia, Serie 3">
            </div>
            <div class="form-group form-group-small">
                <label for="phase">Fase</label>
                <select id="phase" name="phase">
                    <option value="all">Tutte le fasi</option>
                    <option value="L1">Solo L1 — Comunicazione ufficiale</option>
                    <option value="L2">Solo L2 — Media e giornalisti</option>
                    <option value="L3">Solo L3 — Commenti utenti</option>
                </select>
            </div>
            <button type="submit" id="submit-btn">Avvia Test</button>
        </div>
    </form>

    <div id="loading" class="loading" style="display: none;">
        <div class="spinner"></div>
        <p>Scraping in corso... Potrebbe richiedere fino a 30 secondi.</p>
    </div>

    <!-- Previous sessions -->
    <div id="sessions-panel" class="sessions-panel" style="display: none;">
        <h3>Sessioni precedenti</h3>
        <div id="sessions-list" class="sessions-list"></div>
    </div>

    <div id="results-meta" class="results-meta" style="display: none;">
        <span id="meta-credits"></span>
        <span id="meta-duration"></span>
        <span id="meta-session" class="session-badge" style="display: none;"></span>
    </div>

    <div id="results" class="results-container"></div>
</div>

<script src="/frontend/static/js/scraping_test.js"></script>
{% endblock %}
