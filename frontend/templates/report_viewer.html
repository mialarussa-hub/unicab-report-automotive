{% extends "base.html" %}

{% block title %}{{ report.title }} — UNICAB{% endblock %}

{% block content %}
<article class="report-viewer">
    <header>
        <h1>{{ report.title }}</h1>
        <div class="meta">
            <span class="status {{ report.status }}">{{ report.status }}</span>
            <span class="date">Periodo: {{ report.reference_month }}</span>
        </div>
    </header>
    <div class="report-content">
        {{ report.content_final or report.content_draft or "Contenuto non ancora disponibile." }}
    </div>
</article>
{% endblock %}
