{% extends "base.html" %}

{% block title %}Fonti — UNICAB{% endblock %}

{% block content %}
<div class="sources-page">
    <h1>Fonti</h1>
    <p class="subtitle">Gestisci le fonti da cui raccogliere dati per lo scraping.</p>

    <form id="add-source-form" class="add-source-form">
        <div class="form-row">
            <div class="form-group">
                <label for="name">Nome *</label>
                <input type="text" id="name" name="name" placeholder="es. Quattroruote" required>
            </div>
            <div class="form-group">
                <label for="url">URL *</label>
                <input type="text" id="url" name="url" placeholder="es. quattroruote.it" required>
            </div>
            <div class="form-group form-group-small">
                <label for="source_type">Tipo *</label>
                <select id="source_type" name="source_type" required>
                    <option value="news">News / Magazine</option>
                    <option value="forum">Forum</option>
                    <option value="youtube">YouTube</option>
                    <option value="social">Social</option>
                </select>
            </div>
            <button type="submit" id="add-btn">Aggiungi</button>
        </div>
    </form>

    <div id="sources-list" class="sources-list">
        <div class="loading-small">Caricamento fonti...</div>
    </div>
</div>

<script src="/frontend/static/js/sources.js"></script>
{% endblock %}
